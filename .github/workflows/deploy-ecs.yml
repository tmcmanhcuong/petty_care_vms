name: Deploy BE to ECS Fargate

on:
  workflow_run:
    workflows: ["Build & Push BE Image to ECR"]
    types:
      - completed
    branches:
      - main
      - aws-deploy
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'ECR image tag to deploy (default: latest)'
        required: false
        default: 'latest'

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: petty-be
  ECS_CLUSTER: petty-cluster
  ECS_SERVICE: petty-be-task-service-k1id98re
  TASK_DEFINITION: petty-be-task
  CONTAINER_NAME: petty-be

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ECS
    # Only run if triggered by workflow_run AND that workflow succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Determine image tag
        id: image-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            # Use the commit SHA that triggered the build workflow
            TAG="${{ github.event.workflow_run.head_sha }}"
            TAG="${TAG::7}"
          fi
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:$TAG"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "Using image: $IMAGE"

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEFINITION }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.image-tag.outputs.image }}

      - name: Deploy updated task definition to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 5

      - name: Summary
        run: |
          echo "## Deploy Complete 🎉" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** \`${{ env.ECS_SERVICE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Cluster:** \`${{ env.ECS_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ steps.image-tag.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
